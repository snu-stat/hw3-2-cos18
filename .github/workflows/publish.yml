name: Quarto Publish & Container Image
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write          # GHCR 푸시에 필요
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: .github/python-packages.txt

      - name: Install Python dependencies
        run: pip install -r .github/python-packages.txt

      - name: Set up R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # R 패키지 캐싱: r-packages.txt 해시 기반 키
      - name: Cache R packages
        id: cache-r
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('.github/r-packages.txt') }}

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          options(repos = c(CRAN = Sys.getenv("RSPM", unset = "https://cloud.r-project.org")))
          pkgs <- readLines(".github/r-packages.txt")
          need <- setdiff(pkgs, rownames(installed.packages()))
          if (length(need)) install.packages(need)
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          export RETICULATE_PYTHON=$(which python)
          export MPLBACKEND=Agg
          quarto render
        shell: bash -l {0}

      # ---- 컨테이너 이미지 ----
      # 조직(snu-stat)이 아니라 본인 개인 네임스페이스(cos18)로 푸시 → write:packages PAT(GHCR_PAT) 필요.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: cos18
          password: ${{ secrets.GHCR_PAT }}

      # 환경 정의(Dockerfile + 두 requirements)의 해시 앞 6글자를 이미지 태그로 쓴다.
      # 환경이 안 바뀌면 태그가 같아 GHCR에 이미 존재 → 빌드를 생략한다.
      - name: Compute image tag from env hash
        id: tag
        run: |
          h=$(cat Dockerfile .github/python-packages.txt .github/r-packages.txt | sha256sum | cut -c1-6)
          echo "value=$h" >> "$GITHUB_OUTPUT"
          echo "image tag = $h"

      - name: Check if image tag already exists on GHCR
        id: exists
        run: |
          if docker buildx imagetools inspect ghcr.io/cos18/my-r-env:${{ steps.tag.outputs.value }} >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "이미 존재하는 태그 → 환경 이미지 빌드 생략"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push environment image
        if: steps.exists.outputs.found == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/cos18/my-r-env:${{ steps.tag.outputs.value }}

      # Binder가 미리 만든 환경 이미지를 쓰도록 gh-pages에 간단한 Dockerfile을 둔다.
      - name: Write Binder Dockerfile into site
        run: |
          cat > _site/Dockerfile <<'EOF'
          FROM ghcr.io/cos18/my-r-env:${{ steps.tag.outputs.value }}
          COPY --chown=jovyan:users hw03.ipynb /home/jovyan/hw03.ipynb
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
