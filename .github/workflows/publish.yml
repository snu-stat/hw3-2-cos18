name: Quarto Publish & Container Image
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write          # GHCR 푸시에 필요
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: .github/python-packages.txt

      - name: Install Python dependencies
        run: pip install -r .github/python-packages.txt

      - name: Set up R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # R 패키지 캐싱: r-packages.txt 해시 기반 키
      - name: Cache R packages
        id: cache-r
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('.github/r-packages.txt') }}

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          options(repos = c(CRAN = Sys.getenv("RSPM", unset = "https://cloud.r-project.org")))
          pkgs <- readLines(".github/r-packages.txt")
          need <- setdiff(pkgs, rownames(installed.packages()))
          if (length(need)) install.packages(need)
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          export RETICULATE_PYTHON=$(which python)
          export MPLBACKEND=Agg
          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-r-env:latest
